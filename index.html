<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Selebox All-In-One</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="authScreen" class="auth-screen" style="display:none">
  <div class="auth-card">
    <div class="auth-logo">SELEBOX</div>
    <p class="auth-tagline">All-in-one social experience.<br>Connect, share, and react with your world.</p>
    <button class="btn btn-google" id="btnGoogle" style="width:100%">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
    <div class="auth-divider">or</div>
    <button class="btn btn-ghost" id="btnGuest" style="width:100%">Continue as Guest</button>
    <p style="font-size:0.72rem;color:var(--text3);margin-top:1.5rem;line-height:1.6">
      Guest accounts are anonymous. Sign in with Google anytime to keep your data permanently.
    </p>
  </div>
</div>

<!-- MAIN APP -->
<div id="appScreen" style="display:none">

  <!-- TOP HEADER -->
  <header class="topbar">
    <div class="topbar-logo">
      <span class="brand">SELEBOX</span>
      <span class="sub">All-In-One</span>
    </div>

    <div class="topbar-search">
      <input type="text" id="searchInput" placeholder="Search posts and people..."/>
      <button class="topbar-search-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      </button>
      <div class="topbar-results" id="searchResults"></div>
    </div>

    <div class="topbar-actions">
      <button class="topbar-icon-btn" title="Messages">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      </button>
      <button class="topbar-icon-btn" title="Toggle theme" id="btnTheme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <div class="topbar-avatar" id="topbarAvatar" title="Your profile">?</div>
    </div>
  </header>

  <!-- LEFT SIDEBAR -->
  <aside class="sidebar">
    <button class="sidebar-item active" title="Home">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-4a1 1 0 0 1-1-1v-6h-4v6a1 1 0 0 1-1 1H5a2 2 0 0 1-2-2z"/></svg>
    </button>
    <button class="sidebar-item" title="Feed">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
    </button>
    <button class="sidebar-item" title="Videos">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
    </button>
    <button class="sidebar-item" title="Profile" id="btnProfile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </button>
    <div class="sidebar-divider"></div>
    <button class="sidebar-item" title="Bookmarks">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
    </button>
    <div class="sidebar-divider"></div>
    <button class="sidebar-item" title="Sign out" id="btnSignOut">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-wrap">

    <!-- Stories / People row -->
    <div class="stories-row" id="storiesRow"></div>

    <!-- Compose -->
    <div class="compose">
      <div class="compose-top">
        <div class="avatar" id="composeAvatar">?</div>
        <textarea id="composeText" placeholder="What's on your mind?" maxlength="5000"></textarea>
      </div>
      <div id="composeImagePreview"></div>
      <div class="compose-footer">
        <label class="image-upload-btn" title="Add photo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Photo
          <input type="file" accept="image/*" id="composeImageInput"/>
        </label>
        <span class="char-count" id="charCount">0 / 5000</span>
        <div class="spacer"></div>
        <button class="btn btn-purple btn-sm" id="btnPost">Post</button>
      </div>
    </div>

    <!-- Feed -->
    <div id="feed"><div class="loading">Loading feed...</div></div>
  </main>
</div>

<!-- Repost Modal -->
<div class="modal-overlay" id="repostModal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title">Repost</div>
      <button class="modal-close-btn" id="repostClose">×</button>
    </div>
    <textarea class="repost-caption" id="repostCaption" placeholder="Add a caption (optional)…" maxlength="2000"></textarea>
    <div id="repostPreview" class="repost-preview"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" id="repostCancel">Cancel</button>
      <button class="btn btn-purple btn-sm" id="repostSubmit">Repost</button>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">×</button>
  <img id="lightboxImg" src="" alt=""/>
</div>

<div id="toast" style="display:none"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
