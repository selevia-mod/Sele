<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luminary — Community Blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <a href="index.html" class="nav-logo">Luminary</a>
    <div class="nav-links">
      <a href="index.html" class="nav-link active">Feed</a>
      <a href="write.html" class="nav-link">Write</a>
    </div>
    <a href="write.html" class="btn-primary">+ New Post</a>
  </nav>

  <!-- HERO -->
  <header class="hero">
    <div class="hero-glow"></div>
    <p class="hero-eyebrow">Community Stories</p>
    <h1 class="hero-title">Where voices<br><em>illuminate</em> the world</h1>
    <p class="hero-sub">Read, write, and connect with curious minds.</p>
  </header>

  <!-- FEED -->
  <main class="feed" id="feed">
    <!-- Posts are injected by JS -->
  </main>

  <!-- MODAL: View Post -->
  <div class="modal-overlay" id="postModal">
    <div class="modal">
      <button class="modal-close" id="modalClose">&times;</button>
      <div class="modal-content" id="modalContent"></div>
      <div class="modal-actions" id="modalActions"></div>
      <div class="comments-section">
        <h3 class="comments-title">Comments</h3>
        <div class="comment-list" id="commentList"></div>
        <div class="comment-form">
          <input class="comment-input" id="commentInput" placeholder="Share your thoughts…" />
          <button class="btn-primary" id="commentSubmit">Post</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
